<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Design Ideas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            color: #e0e0e0;
        }

        .header {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            padding: 16px 32px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header-icon { font-size: 24px; }
        .header h1 { font-size: 20px; font-weight: 600; color: #fff; }
        .header-sub { font-size: 13px; color: #9ca3af; margin-left: auto; }

        .container { max-width: 1400px; margin: 0 auto; padding: 24px 32px; display: flex; flex-direction: column; gap: 20px; }

        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            overflow: hidden;
        }
        .card-header {
            padding: 14px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card-header h2 { font-size: 14px; font-weight: 600; color: #a78bfa; }
        .card-header .badge {
            background: rgba(167,139,250,0.2);
            color: #a78bfa;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 500;
        }
        .card-body { padding: 16px 20px; }

        /* Thumbnail grid */
        .thumbnail-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
        }
        .thumb-item {
            position: relative;
            border-radius: 8px;
            overflow: hidden;
            aspect-ratio: 1;
            background: rgba(0,0,0,0.3);
            cursor: pointer;
        }
        .thumb-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.2s;
        }
        .thumb-item.excluded img { opacity: 0.25; }
        .thumb-item .rank-badge {
            position: absolute;
            top: 4px;
            left: 4px;
            background: rgba(0,0,0,0.75);
            color: #fbbf24;
            font-size: 10px;
            font-weight: 600;
            padding: 2px 5px;
            border-radius: 4px;
        }
        .thumb-item .exclude-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .thumb-item.excluded .exclude-overlay { opacity: 1; }
        .thumb-item:hover .exclude-overlay { opacity: 1; }
        .thumb-tip { font-size: 11px; color: #6b7280; margin-top: 8px; }

        /* Prompt area */
        .prompt-area {
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }
        .prompt-area textarea {
            flex: 1;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 10px;
            padding: 12px 14px;
            color: #e0e0e0;
            font-family: inherit;
            font-size: 13px;
            resize: vertical;
            min-height: 80px;
            outline: none;
        }
        .prompt-area textarea:focus { border-color: #a78bfa; }
        .prompt-area textarea::placeholder { color: #6b7280; }

        .generate-btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: opacity 0.2s;
        }
        .generate-btn:hover { opacity: 0.9; }
        .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-spinner {
            width: 14px; height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            display: none;
            animation: spin 0.8s linear infinite;
        }
        .generate-btn.loading .btn-spinner { display: block; }
        .generate-btn.loading .btn-text { display: none; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Ideas output */
        .niche-analysis {
            background: rgba(167,139,250,0.08);
            border: 1px solid rgba(167,139,250,0.2);
            border-radius: 10px;
            padding: 14px 16px;
            font-size: 13px;
            line-height: 1.7;
            color: #c4b5fd;
            margin-bottom: 16px;
        }
        .niche-label { font-size: 11px; font-weight: 600; color: #a78bfa; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }

        .ideas-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 14px;
        }
        .idea-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            transition: border-color 0.2s;
        }
        .idea-card:hover { border-color: rgba(167,139,250,0.4); }
        .idea-title {
            font-size: 14px;
            font-weight: 600;
            color: #fff;
        }
        .idea-meta {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .idea-tag {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 500;
        }
        .tag-audience { background: rgba(251,191,36,0.15); color: #fbbf24; }
        .tag-style { background: rgba(34,211,238,0.12); color: #22d3ee; }
        .idea-description { font-size: 12px; color: #9ca3af; line-height: 1.6; }
        .idea-prompt {
            background: rgba(0,0,0,0.25);
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 11px;
            color: #c4b5fd;
            line-height: 1.6;
            flex: 1;
        }
        .idea-prompt-label { font-size: 10px; font-weight: 600; color: #6b7280; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
        .copy-prompt-btn {
            align-self: flex-end;
            padding: 5px 12px;
            background: rgba(167,139,250,0.15);
            border: 1px solid rgba(167,139,250,0.3);
            border-radius: 6px;
            color: #a78bfa;
            font-size: 11px;
            cursor: pointer;
            font-weight: 500;
        }
        .copy-prompt-btn:hover { background: rgba(167,139,250,0.25); }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #6b7280;
            font-size: 13px;
        }
        .empty-state .emoji { font-size: 36px; margin-bottom: 10px; }

        .loading-state {
            text-align: center;
            padding: 40px 20px;
            color: #9ca3af;
            font-size: 13px;
        }
        .loading-dots::after {
            content: '...';
            animation: dots 1.2s steps(4, end) infinite;
        }
        @keyframes dots { 0%,20%{content:'.'} 40%{content:'..'} 60%,100%{content:'...'} }
    </style>
</head>
<body>
    <div class="header">
        <span class="header-icon">💡</span>
        <h1>Design Ideas Generator</h1>
        <span class="header-sub" id="pageSubtitle">Loading...</span>
    </div>

    <div class="container">
        <!-- Input thumbnails -->
        <div class="card">
            <div class="card-header">
                <h2>📸 Input Products</h2>
                <span class="badge" id="thumbCount">0 sản phẩm</span>
                <span style="font-size:12px;color:#6b7280;margin-left:auto;">Click để loại trừ khỏi phân tích</span>
            </div>
            <div class="card-body">
                <div class="thumbnail-grid" id="thumbnailGrid"></div>
            </div>
        </div>

        <!-- Prompt + Generate -->
        <div class="card">
            <div class="card-header">
                <h2>🤖 AI Prompt</h2>
            </div>
            <div class="card-body">
                <div class="prompt-area">
                    <textarea id="customPrompt" placeholder="Tuỳ chỉnh yêu cầu cho AI (để trống dùng mặc định)&#10;Ví dụ: Tập trung vào phong cách vintage, audience là phụ nữ 30-50 tuổi..."></textarea>
                    <button class="generate-btn" id="generateBtn">
                        <span class="btn-text">✨ Generate Ideas</span>
                        <span class="btn-spinner"></span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Output -->
        <div class="card">
            <div class="card-header">
                <h2>🎨 Generated Ideas</h2>
                <span class="badge" id="ideasCount" style="display:none;"></span>
            </div>
            <div class="card-body" id="ideasOutput">
                <div class="empty-state">
                    <div class="emoji">✨</div>
                    <div>Bấm <strong>Generate Ideas</strong> để AI phân tích và tạo ý tưởng thiết kế mới</div>
                </div>
            </div>
        </div>
    </div>

    <script src="ideas.js"></script>
</body>
</html>
